# If you are not me, you probably want to change a lot of things.
# ~/.config/hypr/hyperland.conf

# Arrange the monitors.
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf

# autostart the programs.
exec-once = swaybg -i ~/Pictures/Wallpaper/wallpaper.jpeg
exec-once = hyprlauncher -d
exec-once = waybar
exec-once = mako
exec-once = foot -s
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = rm ~/.cache/cliphist/db

# performance tweaks
exec-once = sudo intel_gpu_frequency -m
exec-once = sudo cpupower frequency-set -g performance
exec-once = nvidia-settings -a "[gpu:0]/GPUPowerMizerMode=1"
exec-once = sudo nvidia-smi -pm 1

# Set cursor theme
env = XCURSOR_SIZE,12
env = XCURSOR_THEME,Bibata-Modern-Ice
exec-once = gsettings set org.gnome.desktop.interface cursor-theme Bibata-Modern-Ice
exec-once = gsettings set org.gnome.desktop.interface cursor-size 12
exec-once = hyprctl setcursor Bibata-Modern-Ice 12

# Fixes blurred xwayland applications on hidpi
xwayland {
  force_zero_scaling = true
}

# Set the standards.
$browser     = helium-browser
$terminal    = footclient
$fileManager = nautilus
$launcher    = hyprlauncher
$powermenu   = ~/.config/hypr/powermenu.sh
$emoji       = rofimoji --selector hyprlauncher --action copy
env          = EDITOR, helix
env          = FREETYPE_PROPERTIES, "truetype:interpreter-version=40"

# Set qt6ct as the QT theme (also applies to qt5ct)
env = QT_QPA_PLATFORMTHEME, qt6ct

# Keyboard and mouse.
exec-once = xset -r 97 # fixes weird bug where "/" is flooded on xwayland.
input {
    kb_layout = br
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    accel_profile = flat

    touchpad {
        natural_scroll = true
        disable_while_typing = false
        scroll_factor = 0.2
    }

    sensitivity = 0 # from -1.0 to 1.0; 0 is the default.
}

# Hyprland settings.
general {
    gaps_in = 4
    gaps_out = 10
    border_size = 1
    col.active_border = rgb(ffffff)
    col.inactive_border = rgb(1b1b1b)
    layout = dwindle

    # https://wiki.hyprland.org/Configuring/Tearing/
    allow_tearing = true
}

decoration {
    rounding = 10

    blur {
        enabled = false
        size = 8
        passes = 3
    }
    shadow {
        enabled = true
        range = 7

    }
}

# Animations
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 2, default, popin 80%
    animation = border, 1, 2, default
    animation = borderangle, 1, 2, default
    animation = fade, 1, 2, default
    animation = workspaces, 1, 2, default
}

misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true
    vrr = 0
}

# Binds
$mainMod = SUPER
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Space, togglefloating
bind = $mainMod, D, exec, $launcher
bind = $mainMod, F, fullscreen
bind = $mainMod, W, exec, $browser
bind = $mainMod, P, exec, $powermenu
bind = $mainMod, V, exec, cliphist list | hyprlauncher --dmenu | cliphist decode | wl-copy
bind = $mainMod, M, exec, $emoji
bind = $mainMod, K, exec, hyprctl kill
bind = $mainMod, L, exec, pidof hyprlock || hyprlock
bind = , XF86Presentation, exec, ~/Documents/Github/nekro-sense/tools/nekroctl_gui.py

# Switch focused window.
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspace binds.
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Drag and resize windows with the mouse.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio key binds.
bind=, XF86AudioRaiseVolume, exec, pactl set-sink-volume \@DEFAULT_SINK@ +5% && ~/.config/mako/volume.sh
bind=, XF86AudioLowerVolume, exec, pactl set-sink-volume \@DEFAULT_SINK@ -5% && ~/.config/mako/volume.sh
bind=, XF86AudioMute, exec, pactl set-sink-mute \@DEFAULT_SINK@ toggle && ~/.config/dunst/volume.sh
bind=, XF86AudioMicMute, exec, pactl set-source-mute \@DEFAULT_SOURCE@ toggle

# Brightness key binds.
bind=, XF86MonBrightnessUp, exec, brightnessctl set 5%+ && ~/.config/mako/brightness.sh
bind=, XF86MonBrightnessDown, exec, brightnessctl set 5%- && ~/.config/mako/brightness.sh

# Browser key bind.
bind=, XF86Search, exec, $browser

# Player key binds.
bind =, XF86AudioPlay, exec, playerctl play-pause
bind =, XF86AudioNext, exec, playerctl next
bind =, XF86AudioPrev, exec, playerctl previous

# Print key binds.
bind =, Print, exec, ~/.config/hypr/print.sh
bind = $mainMod, S, exec, ~/.config/hypr/print.sh


# END
